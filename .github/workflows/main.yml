name: Meli Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'لینک مورد نظر'
        required: true

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download file
        run: |
          wget "${{ github.event.inputs.url }}" -O downloaded_file
      - name: Push file
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Add downloaded file" || echo "No changes"
          git push
